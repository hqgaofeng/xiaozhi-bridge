# xiaozhi-bridge configuration example
#
# Copy this file to config.yaml and edit before running.
# All sections are optional; sensible defaults are used if omitted.

# WebSocket server
server:
  host: 0.0.0.0
  port: 8000
  # Path prefix (xiaozhi-esp32 firmware usually expects /xiaozhi/v1/)
  path: /xiaozhi/v1/
  # WebSocket max message size in bytes (10 MB)
  max_message_size: 10485760

# OpenClaw gateway (the LLM/agent brain)
openclaw:
  # When running bridge via docker compose (recommended), openclaw runs
  # natively on the host. From inside the bridge container, 127.0.0.1 is
  # the container's own loopback — host.docker.internal (mapped via
  # docker-compose extra_hosts) reaches the host. Make sure the host's
  # openclaw.json has gateway.bind != "loopback" (we recommend "lan" or
  # "auto" for single-tenant VPS, "custom" if you have to bind a
  # specific interface).
  # If you run bridge outside docker (e.g. for dev), use the host's
  # loopback directly: http://127.0.0.1:18789.
  base_url: http://host.docker.internal:18789
  # Gateway auth token (Bearer). Empty disables auth.
  api_key: ""
  # Agent target. "openclaw" routes to the default agent; the actual
  # backend LLM is selected inside openclaw. To override, set
  # `backend_model` (sent as the `x-openclaw-model` header).
  model: openclaw
  # Override the backend LLM (e.g. "minimax/MiniMax-M3-highspeed").
  # Leave empty to use whatever openclaw's agent config picks.
  backend_model: ""
  # Stable per-caller session id. openclaw derives a deterministic
  # sessionKey from this, so two devices / integrations using different
  # `user` values never share conversation history.
  user: xiaozhi-bridge
  # Optional: explicit session key (overrides `user` if both set).
  # session_key: ""
  # Use streaming responses (recommended; required by the bridge).
  stream: true
  max_tokens: 4096
  temperature: 0.7
  timeout: 60.0

# ASR provider (pluggable)
# Available providers:
#   - mock         : returns a fixed/random phrase regardless of audio (V1).
#                    Good for dev + tests, zero cost.
#   - sherpa_onnx  : LOCAL streaming Zipformer (bilingual zh+en), CPU only.
#                    V2 #1 — no API key, no per-call cost. ~500MB model dir
#                    (fp32) or ~200MB (int8). See docs/config.md §ASR.
#   - cloud        : NOT YET IMPLEMENTED — skeleton for future
#                    Aliyun/Tencent/iFlytek/Volcengine. Use mock or
#                    sherpa_onnx for now.
asr:
  # Default to sherpa_onnx in production; switch to "mock" for dev.
  provider: sherpa_onnx
  options:
    # Required for sherpa_onnx: directory containing tokens.txt +
    # encoder/decoder/joiner .onnx (+ bpe.vocab for the bilingual model).
    # In production (docker), the model lives on the host and is bind-mounted
    # into the bridge container (see docker-compose.yml volumes).
    model_dir: /opt/xiaozhi-bridge/models/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20
    # Optional: ONNX runtime threads (default 2). Lower on a 1-vCPU VPS.
    # num_threads: 2
    # Optional: "greedy_search" (default, fast) | "modified_beam_search"
    # decoding_method: greedy_search
    # Optional: ONNX runtime provider (default "cpu"; "cuda" reserved for V3+)
    # provider: cpu

# TTS provider (pluggable)
# V1: mock
# V2 #2 (v0.2.3) added: edge (Microsoft neural voices via edge-tts + pydub/ffmpeg)
# V2 #2.1 (v0.2.4) flipless: edge is the default in production
# To go back to mock: change provider to "mock" and set options.mode
tts:
  provider: edge
  voice: zh-CN-XiaoxiaoNeural    # edge-tts voice ID (zh: XiaoxiaoNeural/YunxiNeural/YunyangNeural; en: JennyNeural/GuyNeural)
  rate: "+0%"                    # speech rate: -50% ~ +100%
  volume: "+0%"                  # loudness: -50% ~ +50%
  pitch: "+0Hz"                  # pitch shift: -50Hz ~ +50Hz
  options:
    # Edge-tts-specific config
    chunk_ms: 60                 # PCM chunk size to yield (ms)
    boundary: SentenceBoundary   # or WordBoundary (finer but smaller chunks)
    connect_timeout: 10          # WebSocket connect timeout (s)
    receive_timeout: 60          # WebSocket receive timeout (s)

# Device / session
device:
  # Optional bearer token for device Authorization header
  # If empty, no auth check
  auth_token: ""
  # V2 #6.1: per-device token map. When set, takes precedence
  # over the global auth_token above (and falls back to it if
  # the device_id isn't listed). Example (3 ESP32s each with
  # their own token):
  #   auth_tokens:
  #     esp32-001: "tok-living-room-xyz"
  #     esp32-002: "tok-bedroom-abc"
  #     esp32-003: "tok-kitchen-123"
  # Empty map + empty auth_token above = no auth (V2 #5 default).
  auth_tokens: {}
  session_id_prefix: xiaozhi

# MCP / IoT
# V1: the MCP server is always on. These flags are reserved for V2
# (where we may need pagination, per-session ACLs, etc.) — keep the
# section so yaml stays stable but the runtime ignores it for now.
mcp: {}

# Logging
logging:
  level: INFO
  format: console       # "console" | "json"
  file: null            # e.g. "/var/log/xiaozhi-bridge.log"
