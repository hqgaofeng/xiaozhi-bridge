# xiaozhi-bridge configuration example
#
# Copy this file to config.yaml and edit before running.
# All sections are optional; sensible defaults are used if omitted.

# WebSocket server
server:
  host: 0.0.0.0
  port: 8000
  # Path prefix (xiaozhi-esp32 firmware usually expects /xiaozhi/v1/)
  path: /xiaozhi/v1/
  # WebSocket max message size in bytes (10 MB)
  max_message_size: 10485760

# OpenClaw gateway (the LLM/agent brain)
openclaw:
  # When running bridge via docker compose (recommended), openclaw runs
  # natively on the host. From inside the bridge container, 127.0.0.1 is
  # the container's own loopback — host.docker.internal (mapped via
  # docker-compose extra_hosts) reaches the host. Make sure the host's
  # openclaw.json has gateway.bind != "loopback" (we recommend "lan" or
  # "auto" for single-tenant VPS, "custom" if you have to bind a
  # specific interface).
  # If you run bridge outside docker (e.g. for dev), use the host's
  # loopback directly: http://127.0.0.1:18789.
  base_url: http://host.docker.internal:18789
  # Gateway auth token (Bearer). Empty disables auth.
  api_key: ""
  # Agent target. "openclaw" routes to the default agent; the actual
  # backend LLM is selected inside openclaw. To override, set
  # `backend_model` (sent as the `x-openclaw-model` header).
  model: openclaw
  # Override the backend LLM (e.g. "minimax/MiniMax-M3-highspeed").
  # Leave empty to use whatever openclaw's agent config picks.
  backend_model: ""
  # Stable per-caller session id. openclaw derives a deterministic
  # sessionKey from this, so two devices / integrations using different
  # `user` values never share conversation history.
  user: xiaozhi-bridge
  # Optional: explicit session key (overrides `user` if both set).
  # session_key: ""
  # Use streaming responses (recommended; required by the bridge).
  stream: true
  max_tokens: 4096
  temperature: 0.7
  timeout: 60.0

# ASR provider (pluggable)
# V1 supports: mock
# Add more by implementing asr/<name>.py and registering it
asr:
  provider: mock
  options:
    # Mock-specific config — ignored by other providers
    mode: random         # "random" | "fixed"
    # text: "你好小智"   # used if mode=fixed
    # phrases:            # used if mode=random
    #   - "今天天气怎么样"
    #   - "把灯打开"
    latency_ms: 100

# TTS provider (pluggable)
# V1 supports: mock
tts:
  provider: mock
  voice: zh-CN-XiaoxiaoNeural
  rate: "+0%"
  volume: "+0%"
  options:
    # Mock-specific config
    mode: silence        # "silence" | "tone"
    chunk_ms: 60

# Device / session
device:
  # Optional bearer token for device Authorization header
  # If empty, no auth check
  auth_token: ""
  session_id_prefix: xiaozhi

# MCP / IoT
# V1: the MCP server is always on. These flags are reserved for V2
# (where we may need pagination, per-session ACLs, etc.) — keep the
# section so yaml stays stable but the runtime ignores it for now.
mcp: {}

# Logging
logging:
  level: INFO
  format: console       # "console" | "json"
  file: null            # e.g. "/var/log/xiaozhi-bridge.log"
