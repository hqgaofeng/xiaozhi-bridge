# xiaozhi-bridge Docker Compose
#
# V1 deployment for two services (bridge + web), fronted by the host's
# nginx (with TLS termination + Let's Encrypt for jarvis.beallen.top).
#
# Why no caddy / why bridge and web bind to 127.0.0.1 only:
#   - The host already runs nginx on :80/:443 serving other subdomains
#     (mesh.beallen.top, news.beallen.top, etc.). Adding another
#     HTTPS-terminating reverse proxy in a container would conflict.
#   - Caddy is removed (C1 from the deployment plan). The web container
#     exposes its built SPA on 127.0.0.1:5180, and nginx in
#     /etc/nginx/conf.d/jarvis.beallen.top.conf proxies public traffic
#     to 127.0.0.1:5180 (web) and 127.0.0.1:8000 (bridge).
#
# Why no openclaw service here:
#   - openclaw runs natively on the host (systemd --user), not in Docker.
#     bridge reaches it via http://host.docker.internal:18789 (added
#     by the extra_hosts directive below) or simply by the host's
#     loopback gateway IP from inside the bridge container.
#   - If you want openclaw in Docker too, re-add the openclaw service
#     from git history (it was here before this change).
#
# Usage:
#   docker compose up -d           # start bridge + web
#   docker compose logs -f bridge  # follow bridge logs
#
# First time:
#   1. Copy .env.example to .env and fill in values
#   2. Copy config/config.example.yaml to config/config.yaml
#   3. Make sure openclaw's chatCompletions endpoint is enabled
#      (gateway.http.endpoints.chatCompletions.enabled: true) and
#      restart the host openclaw.
#   4. docker compose up -d

name: xiaozhi-bridge

services:
  # ============================================================
  # Python bridge (WebSocket + protocol layer)
  # ============================================================
  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: xiaozhi-bridge
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # openclaw runs on the host. From inside the bridge container,
      # 127.0.0.1 is the container's own loopback — host.docker.internal
      # (mapped via extra_hosts) reaches the host.
      - XIAOZHI_OPENCLAW__BASE_URL=http://host.docker.internal:18789
      - XIAOZHI_LOGGING__LEVEL=${LOG_LEVEL:-INFO}
      - XIAOZHI_LOGGING__FORMAT=json
      # Timezone: align container logs with host (Asia/Shanghai = UTC+8).
      # Affects structlog's ISO timestamps, which will now read in local
      # time instead of UTC. The V2 /api/logs/stream consumer should
      # also use this for consistency.
      - TZ=Asia/Shanghai
      # V2 #3: share sqlite db with the bridge-api process. The path
      # must match the bridge-api service below; the volume mount
      # keeps the file alive across container restarts.
      - XIAOZHI_API__DB_PATH=/app/data/bridge.db
    volumes:
      - ./config/config.yaml:/app/config.yaml:ro
      # V2 #3: named volume for sqlite so the api process can read
      # what the bridge process writes (and so the data survives
      # `docker compose down`).
      - bridge-data:/app/data
      # Optional: also mount logs to the host for easy tailing.
      - ./logs/bridge:/var/log/xiaozhi-bridge
      # V2 #1: bind-mount the sherpa-onnx model directory from the
      # host. The model is ~500MB (fp32) — far too big to bake into
      # the image. The bridge container is read-only on this path
      # (it never writes to the model). model_dir in config.yaml
      # points to the same /opt/... path as the host.
      - /opt/xiaozhi-bridge/models:/opt/xiaozhi-bridge/models:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8000)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # V2 #1: was 200m. sherpa-onnx fp32 model needs ~200-300MB at
    # load, then settles at ~150-200MB. Keep the headroom for the
    # WS server + LLM client + the rest of the runtime.
    mem_limit: 500m

  # ============================================================
  # V2 #3: HTTP API (FastAPI on port 8001)
  # ============================================================
  # Reads from the same sqlite db the bridge writes to. Separate
  # process = can restart either independently; reads stay live while
  # bridge restarts (and vice versa).
  bridge-api:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: xiaozhi-bridge-api
    restart: unless-stopped
    command: ["python", "-m", "xiaozhi_bridge.api", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - bridge-data:/app/data
    environment:
      - XIAOZHI_API__DB_PATH=/app/data/bridge.db
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 100m
    depends_on:
      - bridge

  # ============================================================
  # Web admin console (static SPA)
  # ============================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: xiaozhi-web
    restart: unless-stopped
    depends_on:
      - bridge
    ports:
      # Loopback only; host nginx (jarvis.beallen.top) proxies here.
      - "127.0.0.1:5180:80"
    environment:
      # Caddy access log in the web container will use this TZ.
      - TZ=Asia/Shanghai
    mem_limit: 50m

# V2 #3: bridge-data is a named volume for sqlite (the bridge
# process writes session/conversation rows; the bridge-api process
# reads them). Without the volume the file would live in the bridge
# container's ephemeral filesystem and the API couldn't see it.
volumes:
  bridge-data:
