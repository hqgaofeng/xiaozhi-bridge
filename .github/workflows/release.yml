name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push bridge
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bridge
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/xiaozhi-bridge:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/xiaozhi-bridge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/xiaozhi-web:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/xiaozhi-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
