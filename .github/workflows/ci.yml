name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Python bridge tests ---
  bridge-tests:
    name: Bridge tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('bridge/pyproject.toml') }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        # `uv run` picks up ruff from the .venv that `uv sync` set up
        # (dev deps include `ruff>=0.6`). Don't `uv pip install ruff`
        # separately — that can pick up a different version.
        run: uv run ruff check src tests

      - name: Type check with mypy
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: bridge/coverage.xml
          flags: bridge

  # --- Web build ---
  web-build:
    name: Web build (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"  # Pin to a known-working version
          # Skip cache: pnpm here — it makes setup-node fail
          # fast on missing lock file lookups, and pnpm install
          # is fast enough without cache on CI.

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint || true  # 暂时不强制

      - name: Build
        run: pnpm build

  # --- Docker build sanity check ---
  docker-build:
    name: Docker build sanity
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [bridge, web]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Dockerfile.${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.target }}
          tags: xiaozhi-${{ matrix.target }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
        # We just build, not push — sanity check that Dockerfile works
